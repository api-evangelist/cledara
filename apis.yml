        type: Website
    description: >-
      The Cledara API provides programmatic access to SaaS subscription
      records, vendors, virtual cards, transactions, approval requests,
      and spend analytics. The API follows REST conventions, uses JSON
      payloads, supports OAuth-based authentication, and offers webhook
      delivery for events such as new subscriptions, card transactions,
      and approval state changes. A sandbox environment is available
      for integration testing.
